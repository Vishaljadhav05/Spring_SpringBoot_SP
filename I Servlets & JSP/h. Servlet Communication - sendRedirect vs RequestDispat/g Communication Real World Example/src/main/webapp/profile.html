<!DOCTYPE html>
<html lang="en">
<!-- This page is copied from google -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Profile Page</title>
    <style>
        /* Reset default browser margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Center the profile card vertically and horizontally on the page */
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Profile Card Container Layout */
        .profile-card {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            padding: 30px 24px;
        }

        /* Avatar Container and Image Styling */
        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #4A90E2;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Typography Styles */
        .profile-name {
            font-size: 24px;
            color: #333333;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .profile-title {
            font-size: 14px;
            color: #4A90E2;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .profile-bio {
            font-size: 15px;
            color: #666666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Social Navigation Links Wrapper */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-links a {
            text-decoration: none;
            color: #555555;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border: 1px solid #dddddd;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        /* Dynamic Visual Effect on Hover */
        .social-links a:hover {
            background-color: #4A90E2;
            color: #ffffff;
            border-color: #4A90E2;
        }

        /* Primary Action Button Styles */
        .btn-contact {
            display: inline-block;
            width: 100%;
            background-color: #4A90E2;
            color: #ffffff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        .btn-contact:hover {
            background-color: #357ABD;
        }
    </style>
</head>
<body>

    <!-- Main Profile Card Structure -->
    <div class="profile-card">
        
        <!-- Avatar Picture Segment -->
        <div class="avatar-container">
            <!-- Unsplash placeholder photo used for immediate testing -->
            <img src="images/Professional.jpg" alt="User Profile Image">
        </div>

        
        <h1 class="profile-name">Vishal Jadhav</h1>
        <p class="profile-title">Java Developer</p>
        <p class="profile-bio">
            Passionate about building responsive user interfaces and clean web solutions. Let's build something great together!
        </p>

        <!-- Social Media Navigation Segment -->
        <div class="social-links">
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
        </div>

        <!-- Primary CTA Trigger -->
        <a href="mailto:vishal@example.com" class="btn-contact">Contact Me</a>
        
    </div>

</body>
</html>
